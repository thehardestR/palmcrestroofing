<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Logo Preview</title>
<style>
  body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; }

  .dark  { background: #1a0a2e; padding: 40px 60px; border-radius: 12px; }

<body style="background:#f0ede8">
  <div class="light">
    <h3>Color version (header)</h3>
    <img src="logo.svg" height="100">
  </div>
  <div class="dark">
    <h3 style="color:#aaa">White version (footer)</h3>
    <img src="logo-white.svg" height="100">
  </div>

</html>
