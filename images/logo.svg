<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 240" role="img" aria-label="Palm Crest Roofing">
  <defs>
    <linearGradient id="pg" x1="106" y1="196" x2="116" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8C1B6E"/>
      <stop offset="38%"  stop-color="#CB2E58"/>
      <stop offset="70%"  stop-color="#F06C18"/>
      <stop offset="100%" stop-color="#F8B418"/>
    </linearGradient>
  </defs>
  <!-- Trunk: tapered, natural slight lean -->
  <path d="M 96,196 C 98,168 104,128 108,96 C 110,82 112,74 112,70
           C 114,74 118,82 120,96 C 122,130 120,168 114,196 Z"
        fill="url(#pg)"/>
  <!-- Frond 1: far-left droop, tip (8,128) -->
  <path d="M 118,66 C 78,58 34,88 8,128
           C 32,106 78,82 108,76 Z" fill="url(#pg)"/>
  <!-- Frond 2: left, tip (34,56) -->
  <path d="M 114,76 C 90,70 60,56 34,56
           C 58,48 92,60 110,62 Z" fill="url(#pg)"/>
  <!-- Frond 3: upper-left, tip (50,18) -->
  <path d="M 108,76 C 84,60 66,32 50,18
           C 72,26 94,48 118,66 Z" fill="url(#pg)"/>
  <!-- Frond 4: center-up, tip (102,2) -->
  <path d="M 106,70 C 94,42 94,16 102,2
           C 120,12 124,40 120,70 Z" fill="url(#pg)"/>
  <!-- Frond 5: upper-right, tip (154,10) -->
  <path d="M 118,66 C 134,42 150,20 154,10
           C 158,24 150,52 108,76 Z" fill="url(#pg)"/>
  <!-- Frond 6: right, tip (194,50) -->
  <path d="M 112,62 C 142,48 170,44 194,50
           C 168,56 140,70 114,78 Z" fill="url(#pg)"/>
  <!-- Frond 7: right-droop, tip (206,108) -->
  <path d="M 118,66 C 152,78 182,94 206,108
           C 180,92 146,76 106,76 Z" fill="url(#pg)"/>
  <!-- Crown knot -->
  <circle cx="112" cy="70" r="8.5" fill="url(#pg)"/>
  <!-- House roofline + swoosh -->
  <path d="M 166,158 L 200,136 L 216,120 L 248,136 L 298,162"
        fill="none" stroke="#E07018" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Chimney -->
  <rect x="240" y="122" width="12" height="30" fill="#E07018" rx="1"/>
  <!-- Front walls + floor -->
  <path d="M 178,158 L 178,196 L 248,196 L 248,158"
        fill="none" stroke="#E07018" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Window with panes -->
  <rect x="200" y="163" width="24" height="21"
        fill="none" stroke="#E07018" stroke-width="2.5" rx="1"/>
  <line x1="212" y1="163" x2="212" y2="184" stroke="#E07018" stroke-width="2"/>
  <line x1="200" y1="173" x2="224" y2="173" stroke="#E07018" stroke-width="2"/>
  <!-- Wordmark -->
  <text x="154" y="218" text-anchor="middle"
        font-family="Montserrat,'Arial Black',Arial,sans-serif"
        font-size="42" font-weight="900" fill="#5A1F4E">PALM CREST</text>
  <text x="154" y="235" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif"
        font-size="17" font-weight="700" letter-spacing="5" fill="#E07018">ROOFING</text>
</svg>