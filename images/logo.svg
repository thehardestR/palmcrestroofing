<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 110" role="img" aria-label="Palm Crest Roofing">
  <defs>
    <linearGradient id="pcSunset" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4A261"/>
      <stop offset="60%" stop-color="#E76F51"/>
      <stop offset="100%" stop-color="#C44536"/>
    </linearGradient>
    <linearGradient id="pcPalm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
    <linearGradient id="pcText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CFD8D3"/>
    </linearGradient>
    <linearGradient id="pcTrunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0732A"/>
      <stop offset="100%" stop-color="#5C3D0A"/>
    </linearGradient>
  </defs>

  <!-- Mark: roof crest + sun + palm -->
  <g transform="translate(8,7)">
    <!-- Sun disc -->
    <circle cx="54" cy="60" r="28" fill="url(#pcSunset)" opacity="0.88"/>

    <!-- Palm tree drawn BEFORE roof so roof overlaps lower trunk -->
    <!-- Curved S-trunk from bottom-left leaning up toward roof peak -->
    <path d="M 16 92 C 20 74 26 56 32 44 C 36 36 40 30 42 24"
          fill="none" stroke="url(#pcTrunk)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Fronds emanating from trunk tip (42, 24) -->
    <g fill="url(#pcPalm)" opacity="0.96">
      <!-- Long left frond -->
      <path d="M 42 24 C 30 16 14 14 4 20 C 16 20 28 22 40 30 Z"/>
      <!-- Drooping left frond -->
      <path d="M 42 24 C 34 20 20 22 10 30 C 22 28 34 26 41 32 Z" opacity="0.82"/>
      <!-- Upper-left frond -->
      <path d="M 42 24 C 32 12 22 4 12 2 C 22 10 32 16 40 26 Z"/>
      <!-- Top frond -->
      <path d="M 42 24 C 40 10 40 1 42 -3 C 44 1 44 10 44 26 Z"/>
      <!-- Upper-right frond -->
      <path d="M 42 24 C 52 12 62 6 70 4 C 62 12 54 18 44 26 Z"/>
    </g>
    <!-- Coconut cluster at trunk-frond junction -->
    <circle cx="40" cy="27" r="2.4" fill="#7A4F1E"/>
    <circle cx="44" cy="26" r="2.1" fill="#7A4F1E"/>
    <circle cx="42" cy="30" r="2" fill="#7A4F1E"/>

    <!-- Roof crest drawn OVER palm -->
    <path d="M 4 92 L 52 22 L 100 92 Z"
          fill="none" stroke="#0F1B18" stroke-width="7" stroke-linejoin="round"/>
    <path d="M 12 92 L 52 30 L 92 92"
          fill="none" stroke="url(#pcSunset)" stroke-width="4" stroke-linejoin="round" opacity="0.95"/>
    <!-- Ridge cap highlight -->
    <path d="M 52 22 L 52 30" stroke="#FFD6A5" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(122,0)">
    <text x="0" y="52"
          font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
          font-size="36" font-weight="800" font-style="italic"
          letter-spacing="1"
          fill="url(#pcText)">PALM CREST</text>
    <text x="0" y="78"
          font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
          font-size="17" font-weight="700"
          letter-spacing="7"
          fill="#E76F51">ROOFING</text>
    <line x1="0" y1="88" x2="295" y2="88" stroke="#2D6A4F" stroke-width="1" opacity="0.6"/>
    <text x="0" y="101"
          font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
          font-size="9" font-weight="600"
          letter-spacing="3"
          fill="#94a3b8">CA LIC. #1109337</text>
  </g>
</svg>
