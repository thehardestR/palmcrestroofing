<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Palm Crest Roofing mark">
  <defs>
    <linearGradient id="pcmSunset" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDB347"/>
      <stop offset="50%" stop-color="#E76F51"/>
      <stop offset="100%" stop-color="#C44536"/>
    </linearGradient>
    <linearGradient id="pcmPalm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#74C69D"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
    <linearGradient id="pcmTrunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C49A3C"/>
      <stop offset="100%" stop-color="#7A5020"/>
    </linearGradient>
  </defs>

  <!-- Palm tree (behind sun) -->
  <path d="M 10 116 C 16 96 22 76 30 62 C 35 52 40 42 42 32"
        fill="none" stroke="url(#pcmTrunk)" stroke-width="5" stroke-linecap="round"/>
  <g fill="url(#pcmPalm)">
    <path d="M 42 32 C 28 26 12 26 4 32 C 16 28 30 28 40 36 Z"/>
    <path d="M 42 32 C 30 18 16 10 6 8 C 18 16 30 22 40 30 Z"/>
    <path d="M 42 32 C 38 16 38 4 40 0 C 42 4 42 16 44 30 Z"/>
    <path d="M 42 32 C 56 20 68 16 76 18 C 66 22 56 26 44 32 Z"/>
    <path d="M 42 32 C 58 30 70 36 76 44 C 64 36 52 34 44 34 Z"/>
  </g>
  <circle cx="39" cy="35" r="3" fill="#7A4F1E"/>
  <circle cx="44" cy="33" r="2.6" fill="#7A4F1E"/>

  <!-- Sun disc (in front of palm) -->
  <circle cx="68" cy="72" r="40" fill="url(#pcmSunset)"/>

  <!-- House roofline silhouette (in front of sun) -->
  <path d="M 0 116 L 0 88 L 24 68 L 30 74 L 60 26 L 90 74 L 96 68 L 120 88 L 120 116 Z"
        fill="#0D1912"/>
  <!-- Ridge highlight -->
  <path d="M 0 88 L 24 68 L 30 74 L 60 26 L 90 74 L 96 68 L 120 88"
        fill="none" stroke="#E76F51" stroke-width="2.5"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Inner ridge echo -->
  <path d="M 8 88 L 26 72 L 60 34 L 94 72 L 112 88"
        fill="none" stroke="#F4A261" stroke-width="1.5"
        stroke-linejoin="round" opacity="0.5"/>
</svg>
