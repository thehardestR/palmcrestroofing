<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 110" role="img" aria-label="Palm Crest Roofing">
  <g transform="translate(8,7)">
    <!-- Sun disc (subtle) -->
    <circle cx="54" cy="60" r="28" fill="#FFFFFF" opacity="0.10"/>

    <!-- Palm tree -->
    <path d="M 16 92 C 20 74 26 56 32 44 C 36 36 40 30 42 24"
          fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" opacity="0.75"/>
    <g fill="#FFFFFF" opacity="0.85">
      <path d="M 42 24 C 30 16 14 14 4 20 C 16 20 28 22 40 30 Z"/>
      <path d="M 42 24 C 34 20 20 22 10 30 C 22 28 34 26 41 32 Z" opacity="0.75"/>
      <path d="M 42 24 C 32 12 22 4 12 2 C 22 10 32 16 40 26 Z"/>
      <path d="M 42 24 C 40 10 40 1 42 -3 C 44 1 44 10 44 26 Z"/>
      <path d="M 42 24 C 52 12 62 6 70 4 C 62 12 54 18 44 26 Z"/>
    </g>

    <!-- Roof crest -->
    <path d="M 4 92 L 52 22 L 100 92 Z"
          fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linejoin="round"/>
    <path d="M 12 92 L 52 30 L 92 92"
          fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round" opacity="0.50"/>
    <path d="M 52 22 L 52 30" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.60"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(122,0)">
    <text x="0" y="52"
          font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
          font-size="36" font-weight="800" font-style="italic"
          letter-spacing="1" fill="#FFFFFF">PALM CREST</text>
    <text x="0" y="78"
          font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
          font-size="17" font-weight="700"
          letter-spacing="7" fill="#FFFFFF" opacity="0.80">ROOFING</text>
    <line x1="0" y1="88" x2="295" y2="88" stroke="#FFFFFF" stroke-width="1" opacity="0.30"/>
    <text x="0" y="101"
          font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
          font-size="9" font-weight="600"
          letter-spacing="3" fill="#FFFFFF" opacity="0.55">CA LIC. #1109337</text>
  </g>
</svg>
