    <g fill="#FFFFFF" opacity="0.80">
      <path d="M 36 24 C 22 20 8 20 2 26 C 14 22 26 22 34 28 Z"/>
      <path d="M 36 24 C 24 12 10 6 2 4 C 12 10 24 14 34 22 Z"/>
      <path d="M 36 24 C 32 10 32 0 34 -4 C 36 0 36 10 38 22 Z"/>
      <path d="M 36 24 C 48 14 60 10 68 12 C 58 16 48 20 38 24 Z"/>
